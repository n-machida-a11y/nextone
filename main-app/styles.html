<!-- Bootstrap 5.3 -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<!-- Bootstrap JS (Bundle with Popper) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>

<style>
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background-color: #f0f2f5;
    font-size: 0.875rem;
  }

  /* ローディング */
  #loading-overlay {
    position: fixed; inset: 0;
    background: #fff;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 9999;
  }

  /* ビュー共通 */
  .view-container {
    min-height: calc(100vh - 56px);
    padding-bottom: 2rem;
  }

  /* ページヘッダー */
  .page-header {
    background: #fff;
    border-bottom: 1px solid #dee2e6;
    padding: 0.75rem 1.25rem;
    margin-bottom: 1rem;
  }
  .page-header h5 {
    margin: 0;
    font-weight: 700;
    color: #212529;
  }

  /* サマリーテーブル */
  .summary-table th, .summary-table td {
    font-size: 0.82rem;
    vertical-align: middle;
    white-space: nowrap;
  }
  .summary-table th { background-color: #e9ecef; font-weight: 700; }
  .summary-table .row-plan     { background-color: #fff; }
  .summary-table .row-forecast { background-color: #f8f9fa; }
  .summary-table .row-actual   { background-color: #f0f6ff; }
  .summary-table .label-cell   { font-weight: 700; color: #495057; }

  /* 案件テーブル */
  .project-table th {
    background: #e9ecef;
    font-size: 0.8rem;
    font-weight: 700;
    white-space: nowrap;
  }
  .project-table td { font-size: 0.82rem; vertical-align: middle; }
  .project-table tbody tr { cursor: pointer; transition: background 0.15s; }
  .project-table tbody tr:hover { background-color: #e8f0fe !important; }
  .project-table tbody tr.active-row { background-color: #dbeafe !important; }

  /* ステータスバッジ */
  .badge-inprogress { background-color: #6c757d; }
  .badge-complete   { background-color: #198754; }
  .badge-risk       { background-color: #dc3545; animation: pulse 1.5s infinite; }
  .badge-retention  { background-color: #ffc107; color: #000; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.6; }
  }

  /* 左パネル（詳細ビュー） */
  .left-panel {
    width: 280px;
    min-width: 280px;
    background: #fff;
    border-right: 1px solid #dee2e6;
    height: calc(100vh - 56px);
    overflow-y: auto;
    position: sticky;
    top: 56px;
  }
  .project-item {
    padding: 0.6rem 0.75rem;
    border-bottom: 1px solid #f0f0f0;
    cursor: pointer;
    transition: background 0.15s;
  }
  .project-item:hover  { background: #f0f6ff; }
  .project-item.active { background: #dbeafe; border-left: 3px solid #0d6efd; }
  .project-item .proj-name { font-size: 0.82rem; font-weight: 600; color: #212529; }
  .project-item .proj-sub  { font-size: 0.75rem; color: #6c757d; }

  /* セクションカード */
  .section-card { background: #fff; border: 1px solid #dee2e6; border-radius: 8px; margin-bottom: 1rem; }
  .section-card .section-header {
    padding: 0.6rem 1rem; border-bottom: 1px solid #dee2e6;
    font-weight: 700; font-size: 0.875rem; color: #495057;
    display: flex; align-items: center; gap: 0.4rem;
    background: #f8f9fa; border-radius: 8px 8px 0 0;
  }
  .section-card .section-body { padding: 0.75rem 1rem; }

  /* 財務カード（詳細ビュー） */
  .finance-card {
    border-radius: 8px; padding: 0.75rem 1rem; text-align: center;
    background: #fff; border: 1px solid #dee2e6;
  }
  .finance-card .fc-label { font-size: 0.72rem; color: #6c757d; margin-bottom: 0.2rem; }
  .finance-card .fc-value { font-size: 1.05rem; font-weight: 700; }
  .finance-card .fc-sub   { font-size: 0.72rem; color: #6c757d; margin-top: 0.1rem; }

  /* キャッシュフローテーブル */
  .cf-table th { background: #e9ecef; font-size: 0.78rem; font-weight: 700; text-align: center; white-space: nowrap; }
  .cf-table td { font-size: 0.78rem; vertical-align: middle; white-space: nowrap; }
  .cf-diff.negative { color: #dc3545; }
  .cf-diff.positive { color: #198754; }

  /* ガントチャート */
  .gantt-container { overflow-x: auto; }
  .gantt-table { border-collapse: collapse; min-width: 100%; }
  .gantt-table th, .gantt-table td {
    border: 1px solid #dee2e6; font-size: 0.78rem;
    padding: 0.3rem 0.5rem; white-space: nowrap;
  }
  .gantt-table th { background: #e9ecef; font-weight: 700; text-align: center; }
  .gantt-month-header { min-width: 80px; text-align: center; }
  .gantt-bar-cell { position: relative; height: 40px; padding: 0 !important; min-width: 80px; }
  .gantt-bar {
    position: absolute; top: 50%; transform: translateY(-50%);
    height: 24px; background: #0d6efd; border-radius: 4px;
    display: flex; align-items: center; padding: 0 6px;
    white-space: nowrap; overflow: hidden;
    font-size: 0.7rem; color: #fff; font-weight: 600;
  }

  /* フィルターバー */
  .filter-bar {
    background: #fff; border-bottom: 1px solid #dee2e6;
    padding: 0.5rem 1rem; display: flex;
    align-items: center; gap: 0.5rem; flex-wrap: wrap;
  }
  .filter-bar .form-control, .filter-bar .form-select { font-size: 0.82rem; }

  /* 合計バー */
  .total-bar {
    background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 6px;
    padding: 0.5rem 1rem; display: flex; gap: 2rem;
    align-items: center; font-size: 0.82rem; flex-wrap: wrap;
  }
  .total-bar .total-item .label { color: #6c757d; font-size: 0.75rem; }
  .total-bar .total-item .value { font-weight: 700; font-size: 1rem; }
  .total-bar .total-item .value.income  { color: #198754; }
  .total-bar .total-item .value.expense { color: #dc3545; }
  .total-bar .total-item .value.bal-pos { color: #0d6efd; }
  .total-bar .total-item .value.bal-neg { color: #dc3545; }

  /* テーブル共通 */
  .table-sm td, .table-sm th { padding: 0.35rem 0.5rem; }

  /* 数値右寄せ */
  .num { text-align: right; white-space: nowrap; }
  .text-red   { color: #dc3545; }
  .text-blue  { color: #0d6efd; }
  .text-green { color: #198754; }

  /* 支払先ランキング */
  .vendor-rank {
    display: flex; align-items: center;
    padding: 0.35rem 0; border-bottom: 1px solid #f0f0f0;
  }
  .vendor-rank .rank-num {
    width: 24px; height: 24px; border-radius: 50%; background: #e9ecef;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.72rem; font-weight: 700; color: #495057; flex-shrink: 0;
  }
  .vendor-rank .rank-name   { flex: 1; padding: 0 0.5rem; font-size: 0.82rem; }
  .vendor-rank .rank-amount { font-size: 0.82rem; font-weight: 700; color: #495057; white-space: nowrap; }

  /* フォーム */
  .form-label { font-size: 0.82rem; font-weight: 600; color: #495057; }
  .form-control, .form-select { font-size: 0.85rem; }
  .required-mark {
    display: inline-block; background: #dc3545; color: #fff;
    font-size: 0.65rem; border-radius: 3px;
    padding: 0 4px; margin-left: 4px; vertical-align: middle;
  }

  /* 動的行入力テーブル */
  .row-input-table th { background: #e9ecef; font-size: 0.78rem; font-weight: 700; white-space: nowrap; }
  .row-input-table td { padding: 0.25rem 0.35rem; }
  .row-input-table .form-control, .row-input-table .form-select { font-size: 0.8rem; }

  /* グラフ */
  .chart-container { position: relative; height: 220px; }

  /* xs フォントサイズ */
  .fs-xs { font-size: 0.7rem; }

  /* スクロールバー細め */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: #f1f1f1; }
  ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 3px; }
</style>
