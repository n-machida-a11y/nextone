// ===================================================
//  状態管理

const EXCEL_IMPORT_URL = 'https://script.google.com/a/macros/race-number.co.jp/s/AKfycbz7YvT95g1z8s-klbyVyqHuCiYVnee4r52HKY9ilEmq3-rTawJT_XyODGHR9dnbaKdWAA/exec';

const HOME_ACTIONS = [
  { icon: 'bi-folder-open',   color: 'text-primary', label: '案件を見る',       desc: '案件の詳細・経費・請求を確認', action: "showView('detail')" },
  { icon: 'bi-folder-plus',   color: 'text-warning', label: '新しい案件を登録',  desc: '台帳番号・客先名・契約金額を入力', action: 'openNewProjectModal()' },
  { icon: 'bi-list-check',    color: 'text-danger',  label: '経費一覧',         desc: '全案件の経費をまとめて確認', action: "showView('expenses')" },

const AppState = {
  currentView: 'home',

  selectedProjectId: null,

// ===================================================
//  サーバー呼び出しラッパー
// ===================================================
function callServer(fnName) {
  const args = Array.prototype.slice.call(arguments, 1);
  return new Promise(function(resolve, reject) {
    const runner = google.script.run
      .withSuccessHandler(resolve)
      .withFailureHandler(reject);
    runner[fnName].apply(runner, args);
  });
}

// ===================================================
//  初期化
// ===================================================
document.addEventListener('DOMContentLoaded', function() {
  showView('home');
});

// ===================================================
//  ビュー切替
// ===================================================
function showView(viewName) {
  AppState.currentView = viewName;
  document.querySelectorAll('.view-container').forEach(el => el.classList.add('d-none'));
  const el = document.getElementById('view-' + viewName);
  if (el) el.classList.remove('d-none');

  switch (viewName) {
    case 'home':     loadHomeView();     break;
    case 'detail':   loadDetailView();   break;
    case 'cashflow': loadCashflowView(); break;
    case 'gantt':    loadGanttView();    break;
    case 'expenses': loadExpensesView(); break;
  }
}

// ===================================================
//  ユーティリティ
// ===================================================
function fmt(num) {
  if (num === null || num === undefined || num === '') return '-';
  return Number(num).toLocaleString('ja-JP') + '円';
}
function fmtNum(num) {
  if (num === null || num === undefined || num === '') return '-';
  return Number(num).toLocaleString('ja-JP');
}
function fmtRate(v) {
  if (v === null || v === undefined || v === '') return '-';
  return Number(v).toFixed(1) + '%';
}
function esc(s) {
  if (s === null || s === undefined) return '';
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(d) {
  if (!d) return '-';
  try {
    const dt = d instanceof Date ? d : new Date(d);
    if (isNaN(dt.getTime())) return String(d);
    return dt.getFullYear() + '/' + String(dt.getMonth()+1).padStart(2,'0') + '/' + String(dt.getDate()).padStart(2,'0');
  } catch(e) { return String(d); }
}
function dateToYM(d) {
  if (!d) return '';
  try {
    const dt = d instanceof Date ? d : new Date(d);
    if (isNaN(dt.getTime())) return '';
    return dt.getFullYear() + '-' + String(dt.getMonth()+1).padStart(2,'0');
  } catch(e) { return ''; }
}
function todayYM() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
}
function addMonths(ym, n) {
  const [y, m] = ym.split('-').map(Number);
  let ny = y, nm = m + n;
  while (nm > 12) { nm -= 12; ny++; }
  while (nm < 1)  { nm += 12; ny--; }
  return ny + '-' + String(nm).padStart(2,'0');
}
function renderStatusBadges(statusArr) {
  if (!Array.isArray(statusArr)) return '';
  return statusArr.map(s => {
    if (s === '赤字注意')      return `<span class="badge badge-risk me-1">${esc(s)}</span>`;
    if (s === '完工')          return `<span class="badge badge-complete me-1">${esc(s)}</span>`;
    if (s === '保留金請求待ち') return `<span class="badge badge-retention me-1">${esc(s)}</span>`;
    return `<span class="badge badge-inprogress me-1">${esc(s)}</span>`;
  }).join('');
}
function showToast(msg, type) {
  const toast = document.getElementById('toast-msg');
  const body  = document.getElementById('toast-body');
  if (!toast || !body) return;
  toast.className = 'toast align-items-center border-0 text-white bg-' + (type === 'error' ? 'danger' : 'success');
  body.textContent = msg;
  const bsToast = new bootstrap.Toast(toast, { delay: 3000 });
  bsToast.show();
}
function showLoading(containerId, msg) {
  const el = document.getElementById(containerId);
  if (el) el.innerHTML = `<div class="d-flex align-items-center justify-content-center py-5 text-secondary"><div class="spinner-border spinner-border-sm me-2"></div>${esc(msg||'読み込み中...')}</div>`;
}
function hideLoading() {
  document.getElementById('loading-overlay').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

// ===================================================

async function loadHomeView() {
  const container = document.getElementById('view-home');
  showLoading('view-home', 'ダッシュボードを読み込み中...');
  try {
    const data = await callServer('getDashboardData');
    if (data && data.error) throw new Error(data.error);
    AppState.dashboardData = data;
    AppState.projects = data.projects || [];
    hideLoading();
    renderHomeView(data);
  } catch(e) {
    container.innerHTML = `<div class="alert alert-danger m-3">${esc(e.message)}</div>`;
    hideLoading();
  }
}

// ===================================================
//  DETAIL ビュー（案件詳細）
// ===================================================
function openDetailView(projectId) {
  AppState.selectedProjectId = projectId;
  showView('detail');
}

async function loadDetailView() {
  const container = document.getElementById('view-detail');

  // プロジェクトリストがなければ取得
  if (!AppState.projects || AppState.projects.length === 0) {
    showLoading('view-detail', '案件一覧を読み込み中...');
    try {
      const data = await callServer('getDashboardData');
      AppState.projects = (data && data.projects) || [];
      hideLoading();
    } catch(e) {
      hideLoading();
    }
  } else {
    hideLoading();
  }

  renderDetailShell();

  if (AppState.selectedProjectId) {
    loadProjectDetail(AppState.selectedProjectId);
  }
}

function renderDetailShell() {
  const container = document.getElementById('view-detail');
  container.innerHTML = `
  <div class="d-flex" style="height:calc(100vh - 56px);">
    <!-- 左パネル：案件リスト -->
    <div class="left-panel">
      <div class="p-2 border-bottom bg-light">
        <button class="btn btn-sm btn-outline-secondary w-100 mb-2" onclick="showView('home')">
          <i class="bi bi-arrow-left me-1"></i>ホームに戻る
        </button>
        <div class="d-flex align-items-center justify-content-between mb-1">
          <span class="fw-bold text-muted" style="font-size:0.88rem;">案件一覧</span>
          <span class="badge bg-secondary">${AppState.projects.length}件</span>
        </div>
        <input type="text" class="form-control form-control-sm" id="detail-search" placeholder="案件名・台帳番号で検索..." oninput="filterLeftPanel(this.value)">
      </div>
      <div id="left-panel-list">
        ${renderLeftPanelList(AppState.projects)}
      </div>
    </div>

    <!-- メインコンテンツ -->
    <div class="flex-grow-1 overflow-auto">
      <div id="detail-main">
        <div class="d-flex align-items-center justify-content-center h-100 text-muted py-5">
          <div class="text-center">

            左のリストから案件を選んでください
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

function renderLeftPanelList(projects) {
  return (projects||[]).map(p => `
  <div class="project-item ${AppState.selectedProjectId===String(p['台帳番号'])?'active':''}"
       onclick="selectProject('${esc(String(p['台帳番号']))}')">
    <div class="proj-name">${esc(p['案件名'])}</div>
    <div class="proj-sub">
      <code>${esc(String(p['台帳番号']))}</code>
      ${p['粗利率']!==null?`<span class="${p['粗利率']<10?'text-danger':'text-success'} ms-1">${fmtRate(p['粗利率'])}</span>`:''}
    </div>
    <div class="mt-1">${renderStatusBadges(p['ステータス'])}</div>
  </div>`).join('') || '<div class="text-muted text-center p-3 fs-xs">案件がありません</div>';
}

function filterLeftPanel(q) {
  const lower = q.toLowerCase();
  const filtered = (AppState.projects||[]).filter(p =>
    String(p['台帳番号']).toLowerCase().includes(lower) ||
    (p['案件名']||'').toLowerCase().includes(lower) ||
    (p['客先名']||'').toLowerCase().includes(lower)
  );
  document.getElementById('left-panel-list').innerHTML = renderLeftPanelList(filtered);
}

function selectProject(projectId) {
  AppState.selectedProjectId = projectId;
  document.querySelectorAll('.project-item').forEach(el => el.classList.remove('active'));
  loadProjectDetail(projectId);
}

async function loadProjectDetail(projectId) {
  const main = document.getElementById('detail-main');
  if (!main) return;
  main.innerHTML = `<div class="d-flex align-items-center justify-content-center py-5 text-secondary"><div class="spinner-border spinner-border-sm me-2"></div>読み込み中...</div>`;
  try {
    const project = await callServer('getProjectById', projectId);
    if (project && project.error) throw new Error(project.error);
    AppState.selectedProject = project;
    renderProjectDetail(project);
    // 左パネルのアクティブ更新
    document.querySelectorAll('.project-item').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.project-item').forEach(el => {
      if (el.onclick && el.onclick.toString().includes("'" + projectId + "'")) el.classList.add('active');
    });
  } catch(e) {
    main.innerHTML = `<div class="alert alert-danger m-3">${esc(e.message)}</div>`;
  }
}

function renderBillingChart(billings, expenses) {
  const canvas = document.getElementById('billing-chart');
  if (!canvas) return;
  if (AppState.billingChart) { AppState.billingChart.destroy(); AppState.billingChart = null; }

  // 月リスト（過去6ヶ月〜今後3ヶ月）
  const months = [];
  for (let i = -5; i <= 3; i++) months.push(addMonths(todayYM(), i));

  const incomeMap = {}, expenseMap = {}, confirmedMap = {};
  months.forEach(m => { incomeMap[m] = 0; expenseMap[m] = 0; confirmedMap[m] = 0; });

  billings.forEach(b => {
    const m = dateToYM(b['入金予定日']) || dateToYM(b['請求日']);
    if (m && incomeMap[m] !== undefined) incomeMap[m] += Number(b['請求金額'])||0;
    const cm = dateToYM(b['請求日']);
    if (cm && confirmedMap[cm] !== undefined) confirmedMap[cm] += Number(b['入金確認額'])||0;
  });
  expenses.forEach(e => {
    const m = dateToYM(e['月']);
    if (m && expenseMap[m] !== undefined) expenseMap[m] += Number(e['金額'])||0;
  });

  AppState.billingChart = new Chart(canvas, {
    type: 'line',
    data: {
      labels: months,
      datasets: [
        {
          label: '請求金額',
          data: months.map(m => incomeMap[m]),
          borderColor: '#0d6efd', backgroundColor: 'rgba(13,110,253,0.1)',
          fill: true, tension: 0.3, pointRadius: 4
        },
        {
          label: '経費',
          data: months.map(m => expenseMap[m]),
          borderColor: '#dc3545', backgroundColor: 'rgba(220,53,69,0.08)',
          fill: false, tension: 0.3, pointRadius: 4
        },
        {
          label: '入金確認額',
          data: months.map(m => confirmedMap[m]),
          borderColor: '#198754', backgroundColor: 'rgba(25,135,84,0.08)',
          fill: false, tension: 0.3, pointRadius: 4, borderDash: [4,3]
        }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'top', labels: { font: { size: 11 }, padding: 8 } } },
      scales: {
        y: {
          ticks: {
            font: { size: 10 },
            callback: v => (v/10000).toFixed(0) + '万'
          }
        },
        x: { ticks: { font: { size: 10 } } }
      }
    }
  });
}

async function reloadCashflow() {
  const startYM   = (document.getElementById('cf-start') || {}).value || todayYM();
  const endYM     = (document.getElementById('cf-end') || {}).value || addMonths(todayYM(), 5);
  const projectId = (document.getElementById('cf-project') || {}).value || '';
  const content   = document.getElementById('cf-content');
  if (content) content.innerHTML = `<div class="d-flex align-items-center justify-content-center py-4 text-secondary"><div class="spinner-border spinner-border-sm me-2"></div>読み込み中...</div>`;

  try {
    const data = await callServer('getCashflowData', startYM, endYM, projectId);
    if (data && data.error) throw new Error(data.error);

    renderCashflowContent(data);

    if (content) content.innerHTML = `<div class="alert alert-danger">${esc(e.message)}</div>`;
  }

function renderGanttView(data) {
  const container = document.getElementById('view-gantt');
  const rows = data.rows || [];

  // 表示月範囲を決定（全案件の工期を包括）
  const now = new Date();
  let minDate = new Date(now.getFullYear(), now.getMonth() - 1, 1);
  let maxDate = new Date(now.getFullYear(), now.getMonth() + 8, 1);

  rows.forEach(r => {
    if (r['工期開始']) {
      const d = new Date(r['工期開始']);
      if (!isNaN(d.getTime()) && d < minDate) minDate = new Date(d.getFullYear(), d.getMonth(), 1);
    }
    if (r['工期終了']) {
      const d = new Date(r['工期終了']);
      if (!isNaN(d.getTime()) && d > maxDate) maxDate = new Date(d.getFullYear(), d.getMonth() + 1, 1);
    }
  });

  // 月リスト生成
  const months = [];
  let cur = new Date(minDate.getFullYear(), minDate.getMonth(), 1);
  while (cur <= maxDate) {
    months.push(cur.getFullYear() + '-' + String(cur.getMonth()+1).padStart(2,'0'));
    cur = new Date(cur.getFullYear(), cur.getMonth()+1, 1);
  }

  const totalMs = maxDate - minDate || 1;

  container.innerHTML = `
  <div class="page-header d-flex align-items-center justify-content-between">
    <h5><i class="bi bi-bar-chart-gantt me-2 text-primary"></i>工期ガントチャート（全案件）</h5>
    <button class="btn btn-sm btn-outline-secondary" onclick="showView('home')">
      <i class="bi bi-arrow-left me-1"></i>ホームへ戻る
    </button>
  </div>
  <div class="px-3">
    <p class="text-muted fs-xs mb-3">各工事の開始日〜終了日を横棒で表示します。行には「契約金額 / 経費 / 粗利」と「工期」を表示します。</p>
    <div class="section-card">
      <div class="section-body p-0">
        <div class="gantt-container">
          <table class="gantt-table">
            <thead>
              <tr>
                <th style="min-width:200px;width:200px">案件</th>
                <th class="num" style="width:110px">契約金額</th>
                <th class="num" style="width:90px">経費</th>
                <th class="num" style="width:90px">粗利益</th>
                ${months.map(m=>`<th class="gantt-month-header">${m.replace('-','/')}</th>`).join('')}
              </tr>
            </thead>
            <tbody>
              ${rows.map(r => {
                const startD  = r['工期開始'] ? new Date(r['工期開始']) : null;
                const endD    = r['工期終了'] ? new Date(r['工期終了']) : null;
                let barStyle  = '';
                let hasBar    = false;

                if (startD && !isNaN(startD.getTime()) && endD && !isNaN(endD.getTime())) {
                  const left  = Math.max(0, Math.min(100, (startD - minDate) / totalMs * 100));
                  const right = Math.max(0, Math.min(100, (maxDate - endD) / totalMs * 100));
                  barStyle = `left:${left.toFixed(1)}%;right:${right.toFixed(1)}%;`;
                  hasBar = true;
                }

                return `
                <tr>
                  <td>
                    <div class="fw-semibold" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:190px" title="${esc(r['案件名'])}">${esc(r['案件名'])}</div>
                    <div class="text-muted fs-xs">${esc(String(r['台帳番号']))} ${esc(r['客先名']||'')}</div>
                  </td>
                  <td class="num fs-xs">${fmt(r['契約金額'])}</td>
                  <td class="num fs-xs text-red">${fmt(r['経費合計'])}</td>

async function reloadExpenses() {
  const month  = (document.getElementById('exp-month')   || {}).value || '';
  const projId = (document.getElementById('exp-project') || {}).value || '';
  const vendor = (document.getElementById('exp-vendor')  || {}).value || '';
  const cont   = document.getElementById('exp-content');
  if (cont) cont.innerHTML = `<div class="d-flex align-items-center justify-content-center py-4 text-secondary"><div class="spinner-border spinner-border-sm me-2"></div>読み込み中...</div>`;

  try {
    const data = await callServer('getAllExpenses', month, projId, vendor);
    if (data && data.error) throw new Error(data.error);
    AppState.expenseData = data;
    renderExpensesContent(data);
  } catch(e) {
    if (cont) cont.innerHTML = `<div class="alert alert-danger">${esc(e.message)}</div>`;
  }
}

function clearExpenseFilters() {
  const m = document.getElementById('exp-month');
  const p = document.getElementById('exp-project');
  const v = document.getElementById('exp-vendor');
  if (m) m.value = '';
  if (p) p.value = '';
  if (v) v.value = '';
  reloadExpenses();
}

async function saveBulkExpenseModal() {
  const projectId = (document.getElementById('bulk-project')||{}).value||'';
  if (!projectId) { showToast('案件を選択してください', 'error'); return; }

  const rows = [];
  document.querySelectorAll('#bulk-rows tr').forEach(tr => {
    const month  = (tr.querySelector('.bulk-month') ||{}).value||'';
    const vendor = (tr.querySelector('.bulk-vendor')||{}).value||'';
    const amount = Number((tr.querySelector('.bulk-amount')||{}).value)||0;
    const note   = (tr.querySelector('.bulk-note')  ||{}).value||'';
    if (month && vendor && amount > 0) rows.push({ month, vendor, amount, note });
  });

  if (rows.length === 0) { showToast('有効な行が1件もありません', 'error'); return; }

  try {
    const res = await callServer('saveBulkExpenses', projectId, rows);
    if (res && res.error) throw new Error(res.error);
    closeModal('bulkExpModal');
    showToast(`${res.count}件の経費を登録しました`, 'success');
    if (AppState.selectedProjectId === projectId) {
      loadProjectDetail(projectId);
    }
  } catch(e) {
    showToast(e.message, 'error');
  }
}

// ===================================================
function showModal(html, id) {
  const area = document.getElementById('modal-area');
  // 既存の同名モーダルを削除
  const existing = document.getElementById(id);
  if (existing) existing.remove();

  area.insertAdjacentHTML('beforeend', html);
  const el = document.getElementById(id);
  if (el) {
    const modal = new bootstrap.Modal(el);
    modal.show();
    // 閉じたらDOMから削除
    el.addEventListener('hidden.bs.modal', () => el.remove());
  }
}

function closeModal(id) {
  const el = document.getElementById(id);
  if (el) {
    const inst = bootstrap.Modal.getInstance(el);
    if (inst) inst.hide();
  }
}

/** AppState.projects から台帳番号→案件情報マップを構築 */
function buildProjectMap() {
  const map = {};
  (AppState.projects || []).forEach(p => {
    const pid   = String(p['台帳番号']);
    const entry = { 案件名: p['案件名'] || '', 客先名: p['客先名'] || '', dbId: pid };
    map[pid] = entry;
    // 先頭ゼロなしバージョンも登録（例: '0274' → '274'）
    const pidInt = String(parseInt(pid, 10));
    if (pidInt !== pid) map[pidInt] = entry;
  });
  return map;
}

  return { ledgerNum: '', projectId: null, projectName: '', clientName: '',

    if (l) row.ledgerNum = l.value.trim();
    if (a) row.amount    = a.value;
    if (n) row.note      = n.value.trim();
  });
}

async function _loadInvoiceModalData() {
  const tasks = [];

  // 案件キャッシュが空なら読み込んでマップを更新
  if (!AppState.projects || AppState.projects.length === 0) {

      callServer('getDashboardData')
        .then(d => {
          AppState.projects   = (d && d.projects) || [];
          AppState.projectMap = buildProjectMap();
        })
        .catch(() => {})
    );
  }

  // 仕入先マスタ → datalist をバックグラウンドで埋める
  tasks.push(
    callServer('getVendors')
      .then(v => {
        if (!Array.isArray(v)) return;
        const dl = document.getElementById('inv-vendor-list');

          .map(item => `<option value="${esc(String(item['仕入先名']))}"></option>`)
          .join('');
      })
      .catch(() => {})
  );

  await Promise.all(tasks);
}

function renderInvRows() {
  const tbody = document.getElementById('inv-rows');
  if (!tbody) return;
  const rows = AppState.invRows || [];
  if (rows.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-3">行を追加してください</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map((row, idx) => {
    let projHtml;
    if (row.lookupStatus === 'found') {
      projHtml = `<span class="text-success fw-semibold">${esc(row.projectName)}</span>`
               + (row.clientName ? `<small class="text-muted ms-1">${esc(row.clientName)}</small>` : '');
    } else if (row.lookupStatus === 'not_found') {
      projHtml = `<span class="text-danger" style="font-size:.82em;">該当なし</span>`;
    } else {
      projHtml = `<span class="text-muted">—</span>`;
    }
    const ti = idx * 3;
    return `<tr>
      <td class="text-center text-muted align-middle" style="font-size:.8em;">${idx + 1}</td>
      <td><input type="text" id="inv-ledger-${idx}" class="form-control form-control-sm font-monospace"
           value="${esc(row.ledgerNum)}" placeholder="9728"
           tabindex="${ti + 1}" onblur="onLedgerBlur(${idx})"
           onkeydown="invTabKey(event,${idx},'ledger')"></td>
      <td class="align-middle" id="inv-projname-${idx}">${projHtml}</td>
      <td><input type="number" id="inv-amount-${idx}" class="form-control form-control-sm"
           value="${row.amount||''}" placeholder="0" style="text-align:right"
           tabindex="${ti + 2}" oninput="updateInvSummary()"
           onkeydown="invTabKey(event,${idx},'amount')"></td>
      <td><input type="text" id="inv-note-${idx}" class="form-control form-control-sm"
           value="${esc(row.note)}" placeholder="備考"
           tabindex="${ti + 3}" onkeydown="invTabKey(event,${idx},'note')"></td>
      <td class="text-center align-middle">
        <button class="btn btn-xs btn-outline-danger p-0 px-1" onclick="removeInvRow(${idx})">
          <i class="bi bi-x"></i></button>

function addInvRow() {
  syncInvRows();

/** Tab キーで 台帳番号→金額→備考→次行台帳番号 の順に移動 */
function invTabKey(e, idx, col) {
  if (e.key !== 'Tab' || e.shiftKey) return;
  let nextId;
  if      (col === 'ledger') { nextId = 'inv-amount-' + idx; }
  else if (col === 'amount') { nextId = 'inv-note-'   + idx; }
  else {
    const nextIdx = idx + 1;
    if (nextIdx >= AppState.invRows.length) {
      // 最終行でTabを押したら行を追加してフォーカス
      e.preventDefault();
      syncInvRows();
      AppState.invRows.push(_newInvRow());
      renderInvRows();
      updateInvSummary();
      setTimeout(() => { const el = document.getElementById('inv-ledger-' + nextIdx); if (el) el.focus(); }, 30);
      return;
    }
    nextId = 'inv-ledger-' + nextIdx;
  }
  const el = document.getElementById(nextId);
  if (el) { e.preventDefault(); el.focus(); }
}

/** 台帳番号入力フォーカスアウト → 案件を自動検索 */
async function onLedgerBlur(idx) {
  const input = document.getElementById('inv-ledger-' + idx);
  if (!input) return;
  const raw = input.value.trim();
  const row = AppState.invRows[idx];
  if (!row) return;
  if (row.ledgerNum === raw && row.lookupStatus !== 'empty') return; // 変化なし
  row.ledgerNum = raw;

  const nameEl = document.getElementById('inv-projname-' + idx);
  if (!nameEl) return;

  if (!raw) {
    row.projectId = null; row.projectName = ''; row.clientName = ''; row.lookupStatus = 'empty';
    nameEl.innerHTML = '<span class="text-muted">—</span>';
    updateInvSummary();
    return;
  }

  // 正規化（ハイフン除去）
  const normalized = raw.replace(/-/g, '').trim();

  // クライアントキャッシュで検索
  const map = AppState.projectMap || {};
  const hit = map[normalized] || map[String(parseInt(normalized, 10))];
  if (hit) {
    row.projectId = hit.dbId; row.projectName = hit.案件名; row.clientName = hit.客先名;
    row.lookupStatus = 'found';
    nameEl.innerHTML = `<span class="text-success fw-semibold">${esc(hit.案件名)}</span>`
                     + (hit.客先名 ? `<small class="text-muted ms-1">${esc(hit.客先名)}</small>` : '');
    updateInvSummary();
    return;
  }

  // キャッシュにない → サーバー問い合わせ
  nameEl.innerHTML = '<span class="text-muted"><span class="spinner-border spinner-border-sm" style="width:.75rem;height:.75rem;"></span></span>';
  try {
    const res = await callServer('lookupProject', normalized);
    if (res && res.found) {
      row.projectId = res['台帳番号']; row.projectName = res['案件名'] || ''; row.clientName = res['客先名'] || '';
      row.lookupStatus = 'found';
      if (!AppState.projectMap) AppState.projectMap = {};
      AppState.projectMap[normalized] = { 案件名: row.projectName, 客先名: row.clientName, dbId: row.projectId };
      nameEl.innerHTML = `<span class="text-success fw-semibold">${esc(row.projectName)}</span>`
                       + (row.clientName ? `<small class="text-muted ms-1">${esc(row.clientName)}</small>` : '');
    } else {
      row.projectId = null; row.projectName = ''; row.clientName = ''; row.lookupStatus = 'not_found';
      nameEl.innerHTML = `<span class="text-danger" style="font-size:.82em;">該当なし</span>`;
    }
  } catch(err) {
    row.lookupStatus = 'not_found';
    nameEl.innerHTML = `<span class="text-danger" style="font-size:.82em;">エラー</span>`;
  }
  updateInvSummary();
}

/** 入力合計と請求総額を照合してフッターバーを更新 */
function updateInvSummary() {
  const el = document.getElementById('inv-summary');
  if (!el) return;
  const rows = AppState.invRows || [];
  let enteredTotal = 0;
  rows.forEach((row, idx) => {
    const a = document.getElementById('inv-amount-' + idx);
    enteredTotal += Number(a ? a.value : row.amount) || 0;
  });
  const headerTotalEl = document.getElementById('inv-total');
  const headerTotal   = Number(headerTotalEl ? headerTotalEl.value : 0) || 0;

  const foundCnt    = rows.filter(r => r.lookupStatus === 'found').length;
  const notFoundCnt = rows.filter(r => r.lookupStatus === 'not_found').length;
  const emptyCnt    = rows.filter(r => !r.ledgerNum).length;

  let diffHtml = '';
  if (headerTotal > 0) {
    const diff = enteredTotal - headerTotal;
    diffHtml = diff === 0
      ? `<span class="text-success fw-bold ms-2">✅ 請求総額と一致</span>`
      : `<span class="text-danger fw-bold ms-2">⚠️ 差額 ${diff > 0 ? '+' : ''}${diff.toLocaleString()}円</span>`;
  }

  el.innerHTML = `<div class="d-flex flex-wrap gap-3 align-items-center">
    <span>入力合計: <strong>${enteredTotal.toLocaleString()}円</strong></span>
    ${headerTotal > 0 ? `<span>請求総額: <strong>${headerTotal.toLocaleString()}円</strong></span>` : ''}
    ${diffHtml}
    <span class="ms-auto">
      <span class="badge bg-success">振分済 ${foundCnt}件</span>
      ${notFoundCnt > 0 ? `<span class="badge bg-danger ms-1">一致なし ${notFoundCnt}件</span>` : ''}
      ${emptyCnt    > 0 ? `<span class="badge bg-secondary ms-1">帳番号なし ${emptyCnt}件</span>` : ''}
    </span>
  </div>`;
}

async function submitInvoiceEntry() {
  const vendor = (document.getElementById('inv-vendor')?.value || '').trim();
  const month  =  document.getElementById('inv-month')?.value  || '';
  const total  = Number(document.getElementById('inv-total')?.value) || 0;

  if (!vendor) { showToast('仕入先名を入力してください', 'error'); return; }
  if (!month)  { showToast('請求年月を入力してください', 'error');  return; }

  // DOM から最新値を収集
  const allRows = (AppState.invRows || []).map((row, idx) => {
    const a = document.getElementById('inv-amount-' + idx);
    const n = document.getElementById('inv-note-'   + idx);
    const l = document.getElementById('inv-ledger-' + idx);
    return { ...row,
      ledgerNum: l ? l.value.trim() : row.ledgerNum,
      amount:    Number(a ? a.value : row.amount) || 0,
      note:      n ? n.value.trim() : row.note
    };
  }).filter(r => r.amount > 0);

  if (allRows.length === 0) { showToast('金額が入力された行がありません', 'error'); return; }

  const toRegister = allRows.filter(r => r.projectId);
  const toSkip     = allRows.filter(r => !r.projectId);

  if (toRegister.length === 0) {
    showToast('振分先の案件が1件もマッチしていません。台帳番号を確認してください。', 'error');
    return;
  }

  const enteredTotal = allRows.reduce((s, r) => s + r.amount, 0);
  let msg = `【${vendor}】の請求書を台帳に反映します。\n\n✅ 振分登録: ${toRegister.length}件`;
  if (toSkip.length > 0) msg += `\n⚪ スキップ（帳番号なし・不一致）: ${toSkip.length}件`;
  if (total > 0 && enteredTotal !== total) {
    msg += `\n\n⚠️ 注意: 入力合計(${enteredTotal.toLocaleString()}円)と請求総額(${total.toLocaleString()}円)が一致しません。`;
  }
  msg += '\n\n登録しますか？';
  if (!confirm(msg)) return;

  try {
    const expRows = toRegister.map(r => ({ 台帳番号: r.projectId, 金額: r.amount, 備考: r.note }));
    const res = await callServer('saveInvoiceWithExpenses',
      { 仕入先: vendor, 請求年月: month, 請求総額: total },
      expRows
    );
    if (res && res.error) throw new Error(res.error);

    const msg2 = `${res.expenseCount}件の経費を登録しました` + (res.skipped > 0 ? `（${res.skipped}件スキップ）` : '');
    showToast(msg2, 'success');

    // 仕入先マスタへの追記（非同期・エラー無視）
    callServer('saveVendor', { 仕入先名: vendor }).catch(() => {});

    closeModal('invoiceModal');
    AppState.invRows = [];
    AppState.dashboardData = null; // 次回ホーム表示時に再集計
    if (AppState.currentView === 'home') loadHomeView();
  } catch(err) {
    showToast(err.message, 'error');
  }
}
</script>
