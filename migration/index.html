<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工事台帳 取り込みツール</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { font-family: 'Noto Sans JP', sans-serif; background: #f0f2f5; }
    .drop-zone {
      border: 3px dashed #adb5bd;
      border-radius: 12px;
      padding: 3rem 2rem;
      text-align: center;
      background: #fff;
      transition: all 0.2s;
      cursor: pointer;
    }
    .drop-zone.drag-over {
      border-color: #0d6efd;
      background: #e8f0fe;
    }
    .drop-zone i { font-size: 3rem; color: #adb5bd; }
    .drop-zone.drag-over i { color: #0d6efd; }
    .file-item { background: #fff; border: 1px solid #dee2e6; border-radius: 8px; padding: 0.75rem 1rem; margin-bottom: 0.5rem; }
    .file-item .status { font-size: 0.8rem; }
    .status-pending { color: #6c757d; }
    .status-processing { color: #0d6efd; }
    .status-done { color: #198754; }
    .status-error { color: #dc3545; }
    .summary-card { background: #fff; border: 1px solid #dee2e6; border-radius: 8px; padding: 1rem; }
  </style>
</head>
<body>

<div class="container py-4" style="max-width: 720px;">
  <h5 class="fw-bold mb-1"><i class="bi bi-database-down me-2 text-primary"></i>工事台帳 取り込みツール</h5>
  <p class="text-muted small mb-3">Excel台帳ファイルをドラッグ＆ドロップしてください</p>

  <!-- ドロップゾーン -->
  <div class="drop-zone mb-3" id="dropZone">
    <i class="bi bi-cloud-arrow-up d-block mb-2"></i>
    <div class="fw-bold mb-1">ここにExcelファイルをドロップ</div>
    <div class="text-muted small">または クリックしてファイルを選択</div>
    <div class="text-muted small mt-1">ファイル名に【台帳番号】を含む .xlsx ファイル</div>
    <input type="file" id="fileInput" multiple accept=".xlsx" style="display:none">
  </div>

  <!-- ファイル一覧 -->
  <div id="fileList"></div>

  <!-- 実行ボタン -->
  <div id="actionArea" class="d-none mt-3">
    <button class="btn btn-primary w-100 fw-bold" id="btnStart" onclick="startMigration()">
      <i class="bi bi-play-fill me-1"></i>取り込み開始
    </button>
  </div>

  <!-- 結果サマリー -->
  <div id="summaryArea" class="d-none mt-3">
    <div class="summary-card">
      <h6 class="fw-bold"><i class="bi bi-check-circle text-success me-1"></i>取り込み完了</h6>
      <div id="summaryContent"></div>
    </div>
  </div>
</div>

<script>
const fileQueue = [];

// --- ドラッグ＆ドロップ ---
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', (e) => addFiles(e.target.files));

dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  addFiles(e.dataTransfer.files);
});

function addFiles(files) {
  for (let i = 0; i < files.length; i++) {
    const f = files[i];
    if (!f.name.endsWith('.xlsx')) continue;
    const idMatch = f.name.match(/【(\d+)】/);
    if (!idMatch) continue;
    // 重複チェック
    if (fileQueue.some(q => q.name === f.name)) continue;
    fileQueue.push({ name: f.name, projectId: idMatch[1], file: f, status: 'pending', message: '' });
  }
  renderFileList();
  document.getElementById('actionArea').classList.toggle('d-none', fileQueue.length === 0);
}

function renderFileList() {
  const html = fileQueue.map((f, i) => {
    let statusHtml = '';
    if (f.status === 'pending')     statusHtml = '<span class="status status-pending"><i class="bi bi-clock me-1"></i>待機中</span>';
    if (f.status === 'processing')  statusHtml = '<span class="status status-processing"><i class="bi bi-arrow-repeat me-1 spin"></i>処理中...</span>';
    if (f.status === 'done')        statusHtml = '<span class="status status-done"><i class="bi bi-check-circle me-1"></i>' + f.message + '</span>';
    if (f.status === 'error')       statusHtml = '<span class="status status-error"><i class="bi bi-x-circle me-1"></i>' + f.message + '</span>';

    return '<div class="file-item d-flex align-items-center justify-content-between">' +
      '<div>' +
        '<div class="fw-semibold small">[' + f.projectId + '] ' + f.name.substring(0, 45) + (f.name.length > 45 ? '...' : '') + '</div>' +
        '<div>' + statusHtml + '</div>' +
      '</div>' +
      (f.status === 'pending' ? '<button class="btn btn-sm btn-outline-danger" onclick="removeFile(' + i + ')"><i class="bi bi-x"></i></button>' : '') +
    '</div>';
  }).join('');
  document.getElementById('fileList').innerHTML = html;
}

function removeFile(idx) {
  fileQueue.splice(idx, 1);
  renderFileList();
  document.getElementById('actionArea').classList.toggle('d-none', fileQueue.length === 0);
}

// --- 取り込み実行 ---
async function startMigration() {
  const btn = document.getElementById('btnStart');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>処理中...';

  let totalProjects = 0, totalExpenses = 0, totalBillings = 0, errors = 0;

  for (let i = 0; i < fileQueue.length; i++) {
    if (fileQueue[i].status !== 'pending') continue;
    fileQueue[i].status = 'processing';
    renderFileList();

    try {
      const base64 = await readFileAsBase64(fileQueue[i].file);
      const result = await callServer('processUploadedFile', base64, fileQueue[i].name);

      if (result.error) {
        fileQueue[i].status = 'error';
        fileQueue[i].message = result.error;
        errors++;
      } else {
        fileQueue[i].status = 'done';
        fileQueue[i].message = '経費' + result.expenses + '件, 請求' + result.billings + '件';
        totalProjects++;
        totalExpenses += result.expenses;
        totalBillings += result.billings;
      }
    } catch (e) {
      fileQueue[i].status = 'error';
      fileQueue[i].message = e.message || 'エラー';
      errors++;
    }
    renderFileList();
  }

  btn.disabled = false;
  btn.innerHTML = '<i class="bi bi-play-fill me-1"></i>取り込み開始';

  // サマリー表示
  const summary = document.getElementById('summaryArea');
  summary.classList.remove('d-none');
  document.getElementById('summaryContent').innerHTML =
    '<div class="small mt-2">' +
    '  <div>案件: <strong>' + totalProjects + '</strong>件</div>' +
    '  <div>経費明細: <strong>' + totalExpenses + '</strong>件</div>' +
    '  <div>請求入金: <strong>' + totalBillings + '</strong>件</div>' +
    (errors > 0 ? '  <div class="text-danger">エラー: <strong>' + errors + '</strong>件</div>' : '') +
    '</div>';
}

function readFileAsBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function callServer(fn) {
  const args = Array.prototype.slice.call(arguments, 1);
  return new Promise((resolve, reject) => {
    const runner = google.script.run.withSuccessHandler(resolve).withFailureHandler(reject);
    runner[fn].apply(runner, args);
  });
}
</script>

<style>
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.spin { display: inline-block; animation: spin 1s linear infinite; }
</style>

</body>
</html>
